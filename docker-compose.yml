services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: kb-postgres
    environment:
      POSTGRES_USER: kb_user
      POSTGRES_PASSWORD: kb_internal_pass
      POSTGRES_DB: knowledgebase
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb_user -d knowledgebase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kb-backend
    environment:
      DATABASE_URL: postgresql://kb_user:kb_internal_pass@postgres:5432/knowledgebase
      SECRET_KEY: ${SECRET_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend-react
    container_name: kb-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data: